<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AI Book Creator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-4">Crea tu libro con IA 📖</h1>
        <div class="card p-4 shadow-sm">
            <label class="form-label">Escribe una breve descripción de tu historia:</label>
            <textarea id="descripcion" class="form-control" rows="4" placeholder="Ej: Una historia de misterio en un laboratorio dental abandonado..."></textarea>
            <button id="btn-crear" class="btn btn-primary mt-3">Generar Libro</button>
        </div>
        <div id="resultado" class="mt-5"></div>
    </div>
    <script src="assets/js/script.js"></script>
</body>
</html>
